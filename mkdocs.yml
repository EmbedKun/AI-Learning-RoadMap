site_name: AI Learning Roadmap
site_description: A polished AI learning roadmap spanning foundations, models, systems, infrastructure, and products.
site_author: Minkun Xue
repo_url: https://github.com/EmbedKun/AI-Learning-RoadMap
repo_name: EmbedKun/AI-Learning-RoadMap
edit_uri: edit/main/docs/
copyright: Copyright © 2026 Minkun Xue

nav:
  - Home: index.md
  - Full Roadmap: roadmap.md

theme:
  name: material
  language: zh
  font: false
  favicon: assets/images/AI-five-layer-stack.png
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit
    - content.action.view
    - toc.follow
  palette:
    - scheme: default
      primary: black
      accent: amber
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/EmbedKun/AI-Learning-RoadMap
