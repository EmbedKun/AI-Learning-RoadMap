<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="960" rx="36" fill="#F7FBFD"/>
  <rect x="56" y="56" width="1488" height="848" rx="28" fill="white" stroke="#D8E9EE" stroke-width="4"/>
  <text x="96" y="124" fill="#183B56" font-family="Georgia, 'Songti SC', STSong, serif" font-size="42" font-weight="700">The Big Picture</text>
  <text x="96" y="168" fill="#5C6B7A" font-family="'Songti SC', STSong, serif" font-size="24">A progressive learning flow from foundations to research taste.</text>

  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DDF4F1"/>
      <stop offset="100%" stop-color="#C3E9E5"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E7F0FF"/>
      <stop offset="100%" stop-color="#D4E3FF"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2E8FF"/>
      <stop offset="100%" stop-color="#E4D4FF"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF0DA"/>
      <stop offset="100%" stop-color="#FFE3B5"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7E9"/>
      <stop offset="100%" stop-color="#C7EDD6"/>
    </linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDE5E8"/>
      <stop offset="100%" stop-color="#FAC9D2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#7C95A3" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#4E8098"/>
    </marker>
  </defs>

  <g filter="url(#shadow)">
    <rect x="108" y="230" width="360" height="120" rx="28" fill="url(#g1)"/>
    <text x="148" y="283" fill="#143642" font-family="Georgia, 'Songti SC', STSong, serif" font-size="32" font-weight="700">History &amp; Math</text>
    <text x="148" y="324" fill="#335C67" font-family="'Songti SC', STSong, serif" font-size="22">历史、数学与第一性原理</text>

    <rect x="560" y="230" width="420" height="120" rx="28" fill="url(#g2)"/>
    <text x="600" y="283" fill="#102A43" font-family="Georgia, 'Songti SC', STSong, serif" font-size="30" font-weight="700">Classical ML &amp; Deep Learning</text>
    <text x="600" y="324" fill="#486581" font-family="'Songti SC', STSong, serif" font-size="22">机器学习与深度学习核心</text>

    <rect x="1072" y="230" width="372" height="120" rx="28" fill="url(#g3)"/>
    <text x="1112" y="273" fill="#3D246C" font-family="Georgia, 'Songti SC', STSong, serif" font-size="29" font-weight="700">RL / NLP / LLM</text>
    <text x="1112" y="314" fill="#5C3D99" font-family="'Songti SC', STSong, serif" font-size="22">强化学习、语言模型、多模态</text>

    <rect x="220" y="520" width="430" height="120" rx="28" fill="url(#g4)"/>
    <text x="260" y="563" fill="#6B3E00" font-family="Georgia, 'Songti SC', STSong, serif" font-size="29" font-weight="700">Hardware / Infra / Distributed Systems</text>
    <text x="260" y="604" fill="#8A5A14" font-family="'Songti SC', STSong, serif" font-size="22">硬件、系统、通信、并行、运行时</text>

    <rect x="742" y="520" width="360" height="120" rx="28" fill="url(#g5)"/>
    <text x="782" y="563" fill="#125B38" font-family="Georgia, 'Songti SC', STSong, serif" font-size="31" font-weight="700">Serving / MLOps / Products</text>
    <text x="782" y="604" fill="#2D7A53" font-family="'Songti SC', STSong, serif" font-size="22">服务化、应用开发、产品落地</text>

    <rect x="1194" y="520" width="250" height="120" rx="28" fill="url(#g6)"/>
    <text x="1234" y="563" fill="#7A1533" font-family="Georgia, 'Songti SC', STSong, serif" font-size="30" font-weight="700">Research Taste</text>
    <text x="1234" y="604" fill="#9F3252" font-family="'Songti SC', STSong, serif" font-size="22">前沿判断与长期输入</text>
  </g>

  <path d="M468 290H540" stroke="#4E8098" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M980 290H1052" stroke="#4E8098" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1258 350C1258 414 1006 434 880 470" stroke="#4E8098" stroke-width="6" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M650 580H722" stroke="#4E8098" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1102 580H1174" stroke="#4E8098" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="96" y="826" fill="#64748B" font-family="'Songti SC', STSong, serif" font-size="24">Learn in layers, build in systems, and keep translating knowledge into code, experiments, and products.</text>
</svg>
